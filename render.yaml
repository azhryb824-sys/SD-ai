services:
  - type: web
    name: sd-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: KEEPALIVE_INTERVAL
        value: "540"

cron:
  - name: keepalive-ping
    schedule: "*/15 * * * *"
    command: curl -sf -o /dev/null https://sd-ai.onrender.com/health
